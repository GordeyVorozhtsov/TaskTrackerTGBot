<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Task Tracker</title>
  <script>
    (function () {
      var t = localStorage.getItem("tt-theme");
      document.documentElement.dataset.theme = t === "light" ? "light" : "dark";
    })();
  </script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="/css/styles.css?v=16" />
</head>
<body>
  <div id="app">
    <header id="header" class="header hidden">
      <button id="back-btn" class="icon-btn hidden" aria-label="Назад">←</button>
      <h1 id="page-title" class="page-title">Доски</h1>
      <button id="theme-btn" type="button" class="icon-btn hidden" aria-label="Сменить тему">☀️</button>
      <button id="header-action" class="icon-btn hidden" aria-label="Действие">+</button>
    </header>
    <main id="main"></main>
  </div>

  <div id="modal-overlay" class="modal-overlay hidden">
    <div id="modal" class="modal" role="dialog"></div>
  </div>
  <div id="toast" class="toast hidden"></div>

  <script type="module" src="/js/app.js?v=16"></script>
</body>
</html>
